<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi! I am Rab-bits</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-close:hover {
            background-color: white;
        }
    </style>
</head>

<body>
    <p id="logo">Rab-bits</p>
    <button type="button" id="liveToastBtn" class="btn btn-dark" style="left: 90%;position: relative; top:-30px;"><i class="fa fa-user"></i></button>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <img class="rounded me-2">
                <strong class="me-auto">Sign-in with</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                <div id="google">Google</div>
            </div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="closeSidebar"><i class="fa fa-close"></i></button>
        <input type="text" placeholder="search" id="search">
        <nav>

        </nav>
    </div>

    <button class="sidebar-toggle" id="openSidebar"><i class="fa fa-list"></i></button>
    <div class="chat">
        <p id="welcome_text">Hi Bro! I am your digital friend..<br>Want to share something with me?</p>
    </div>
    <div class="container">

        <button class="option"><i class="fa fa-plus"></i> <span class="tooltip">
                <ul>
                    <li><input type="file" id="fileInput" name="filename" style="display: none;">
                        <label for="fileInput"><i class="fa fa-file"></i> Add File</label>
                    </li>
                    <li><i class="fa fa-crop"></i> Take a Screen shot</li>
                </ul>
            </span></button>
        <button class="option"><i class="fa fa-microphone"></i></button>
        <input type="text" placeholder="Tell me your ideas..." id="text">
        <button class="option" onclick="add()"><i class="fa fa-paper-plane"></i></button>
    </div>
    
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
