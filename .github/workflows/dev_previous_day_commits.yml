name: automation | Previous Day Dev Commits

on:
  schedule:
    - cron: "59 23 * * *"
  push:
    branches:
      - feature/cog-4577-continuous-docs-drafting-from-dev

permissions:
  contents: read

jobs:
  list-dev-commits:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch latest dev branch
        run: git fetch origin dev --no-tags

      - name: Collect previous day commits from dev
        env:
          TARGET_BRANCH: origin/dev
        run: |
          read -r START_DATE END_DATE <<EOF
          $(python3 - <<'PY'
          from datetime import datetime, time, timedelta, timezone

          today = datetime.now(timezone.utc).date()
          start = datetime.combine(today - timedelta(days=1), time.min, tzinfo=timezone.utc)
          end = datetime.combine(today, time.min, tzinfo=timezone.utc)

          print(start.strftime("%Y-%m-%dT%H:%M:%SZ"), end.strftime("%Y-%m-%dT%H:%M:%SZ"))
          PY
          )
          EOF

          echo "Collecting commit subjects from ${TARGET_BRANCH}"
          echo "Time window (UTC): ${START_DATE} <= committed_at < ${END_DATE}"

          COMMITS_FILE="$(mktemp)"
          DETAILS_FILE="$(mktemp)"

          git log "${TARGET_BRANCH}" \
            --since="${START_DATE}" \
            --until="${END_DATE}" \
            --pretty=format:'%H%x09%s' > "${COMMITS_FILE}"

          {
            echo "## Previous day commits on dev"
            echo
            echo "- Source branch: \`${TARGET_BRANCH}\`"
            echo "- Time window (UTC): \`${START_DATE}\` to \`${END_DATE}\`"
            echo
            if [ -s "${COMMITS_FILE}" ]; then
              echo "### Commit titles"
              echo
              while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
                echo "- ${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
              done < "${COMMITS_FILE}"
              echo
              echo "### Change content"
              echo
              while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
                {
                  echo "#### ${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
                  echo
                  echo '```diff'
                  git show "${COMMIT_SHA}" \
                    --format='commit %H%nAuthor: %an <%ae>%nDate: %cI%nTitle: %s%n' \
                    --stat \
                    --patch
                  echo '```'
                  echo
                } >> "${DETAILS_FILE}"
              done < "${COMMITS_FILE}"
              cat "${DETAILS_FILE}"
            else
              echo "No commits were found on \`${TARGET_BRANCH}\` during the previous UTC day."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ -s "${COMMITS_FILE}" ]; then
            echo "Commit titles:"
            while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
              echo "- ${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
            done < "${COMMITS_FILE}"
            echo
            echo "Detailed changes:"
            while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
              echo "::group::${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
              git show "${COMMIT_SHA}" \
                --format='commit %H%nAuthor: %an <%ae>%nDate: %cI%nTitle: %s%n' \
                --stat \
                --patch
              echo "::endgroup::"
            done < "${COMMITS_FILE}"
          else
            echo "No commits were found on ${TARGET_BRANCH} during the previous UTC day."
          fi
