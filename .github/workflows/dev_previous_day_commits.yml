name: automation | Generate Current Day Dev Notes

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:
  schedule:
    - cron: "59 23 * * *"

permissions:
  contents: read

jobs:
  prepare-merged-branches:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      start_date: ${{ steps.prepare.outputs.start_date }}
      end_date: ${{ steps.prepare.outputs.end_date }}
      has_merges: ${{ steps.prepare.outputs.has_merges }}
      merge_summary: ${{ steps.prepare.outputs.merge_summary }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch latest dev branch
        run: git fetch origin dev --no-tags

      - name: Prepare current day merged branches
        id: prepare
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from datetime import datetime, time, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc)
          start = datetime.combine(now.date(), time.min, tzinfo=timezone.utc)
          end = now

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          raw_log = git(
              "log",
              "origin/dev",
              "--merges",
              "--first-parent",
              f"--since={start.strftime('%Y-%m-%dT%H:%M:%SZ')}",
              f"--until={end.strftime('%Y-%m-%dT%H:%M:%SZ')}",
              "--pretty=format:%H%x1f%P%x1f%s%x1f%b%x1e",
          )

          merges = []
          for record in raw_log.split("\x1e"):
              if not record.strip():
                  continue
              merge_sha, parents, subject, body = record.strip().split("\x1f", 3)
              parent_parts = parents.split()
              if len(parent_parts) < 2:
                  continue
              first_parent, second_parent = parent_parts[0], parent_parts[1]

              branch_name = None
              pr_match = re.search(r"Merge pull request #\d+ from [^/]+/(.+)", subject)
              if pr_match:
                  branch_name = pr_match.group(1).strip()
              if not branch_name:
                  branch_match = re.search(r"Merge branch '([^']+)'", subject)
                  if branch_match:
                      branch_name = branch_match.group(1).strip()
              if not branch_name:
                  body_match = re.search(r"from [^/]+/(.+)", body)
                  if body_match:
                      branch_name = body_match.group(1).strip()
              if not branch_name:
                  branch_name = f"merge-{merge_sha[:7]}"

              safe_branch = re.sub(r"[^a-z0-9]+", "-", branch_name.lower()).strip("-") or f"merge-{merge_sha[:7]}"

              merges.append(
                  {
                      "merge_sha": merge_sha,
                      "short_sha": merge_sha[:7],
                      "first_parent": first_parent,
                      "second_parent": second_parent,
                      "branch_name": branch_name,
                      "safe_branch": safe_branch,
                      "subject": subject,
                  }
              )

          merge_lines = [
              f"- {item['branch_name']} ({item['short_sha']}): {item['subject']}"
              for item in merges
          ]

          print("Current day merged branches on origin/dev")
          print(f"Time window (UTC): {start.strftime('%Y-%m-%dT%H:%M:%SZ')} to {end.strftime('%Y-%m-%dT%H:%M:%SZ')}")
          if merge_lines:
              for line in merge_lines:
                  print(line)
          else:
              print("No branches were merged into origin/dev during the current UTC day.")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"start_date={start.strftime('%Y-%m-%dT%H:%M:%SZ')}\n")
              fh.write(f"end_date={end.strftime('%Y-%m-%dT%H:%M:%SZ')}\n")
              fh.write(f"has_merges={'true' if merges else 'false'}\n")
              fh.write("merge_summary<<EOF\n")
              if merge_lines:
                  fh.write("\n".join(merge_lines))
                  fh.write("\n")
              else:
                  fh.write("No branches were merged into origin/dev during the current UTC day.\n")
              fh.write("EOF\n")

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as fh:
              fh.write("## Current day merged branches on dev\n\n")
              fh.write("- Source branch: `origin/dev`\n")
              fh.write(
                  f"- Time window (UTC): `{start.strftime('%Y-%m-%dT%H:%M:%SZ')}` to `{end.strftime('%Y-%m-%dT%H:%M:%SZ')}`\n\n"
              )
              if merge_lines:
                  fh.write("### Merged branches\n\n")
                  fh.write("\n".join(merge_lines))
                  fh.write("\n")
              else:
                  fh.write("No branches were merged into `origin/dev` during the current UTC day.\n")
          PY

  generate-and-assess-dev-notes:
    needs: prepare-merged-branches
    if: ${{ needs.prepare-merged-branches.outputs.has_merges == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out core repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch latest dev branch
        run: git fetch origin dev --no-tags

      - name: Prepare output paths
        id: output_paths
        run: |
          OUTPUT_DIR=".daily-dev-notes"
          mkdir -p "${OUTPUT_DIR}"
          echo "output_dir=${OUTPUT_DIR}" >> "${GITHUB_OUTPUT}"
          echo "notes_json=${OUTPUT_DIR}/dev_notes.json" >> "${GITHUB_OUTPUT}"
          echo "notes_markdown=${OUTPUT_DIR}/dev_notes.md" >> "${GITHUB_OUTPUT}"
          echo "assessment_json=${OUTPUT_DIR}/docs_assessment.json" >> "${GITHUB_OUTPUT}"
          echo "assessment_markdown=${OUTPUT_DIR}/docs_assessment.md" >> "${GITHUB_OUTPUT}"

      - name: Generate current day dev notes
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/gpt-4o-mini' }}
          START_DATE: ${{ needs.prepare-merged-branches.outputs.start_date }}
          END_DATE: ${{ needs.prepare-merged-branches.outputs.end_date }}
          NOTES_JSON: ${{ steps.output_paths.outputs.notes_json }}
          NOTES_MARKDOWN: ${{ steps.output_paths.outputs.notes_markdown }}
        run: |
          python3 tools/generate_dev_notes.py \
            --target-branch origin/dev \
            --start-date "${START_DATE}" \
            --end-date "${END_DATE}" \
            --json-output "${NOTES_JSON}" \
            --markdown-output "${NOTES_MARKDOWN}"

      - name: Assess documentation impact from dev notes
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/gpt-4o-mini' }}
          NOTES_JSON: ${{ steps.output_paths.outputs.notes_json }}
          NOTES_MARKDOWN: ${{ steps.output_paths.outputs.notes_markdown }}
          ASSESSMENT_JSON: ${{ steps.output_paths.outputs.assessment_json }}
          ASSESSMENT_MARKDOWN: ${{ steps.output_paths.outputs.assessment_markdown }}
        run: |
          python3 tools/assess_dev_notes.py \
            --notes-json "${NOTES_JSON}" \
            --notes-markdown "${NOTES_MARKDOWN}" \
            --json-output "${ASSESSMENT_JSON}" \
            --markdown-output "${ASSESSMENT_MARKDOWN}"

      - name: Echo generated notes and assessment
        run: |
          {
            echo "## Dev notes"
            echo
            echo '```md'
            cat "${{ steps.output_paths.outputs.notes_markdown }}"
            echo '```'
            echo
            echo "## Documentation assessment"
            echo
            echo '```md'
            cat "${{ steps.output_paths.outputs.assessment_markdown }}"
            echo '```'
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "::group::dev_notes.md"
          cat "${{ steps.output_paths.outputs.notes_markdown }}"
          echo "::endgroup::"
          echo "::group::docs_assessment.md"
          cat "${{ steps.output_paths.outputs.assessment_markdown }}"
          echo "::endgroup::"

      - name: Upload notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-day-dev-notes
          path: ${{ steps.output_paths.outputs.output_dir }}
          if-no-files-found: error

  skip-when-no-merges:
    needs: prepare-merged-branches
    if: ${{ needs.prepare-merged-branches.outputs.has_merges != 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: No merged branches to review
        run: echo "No current-day merge commits found on origin/dev; skipping docs review."
