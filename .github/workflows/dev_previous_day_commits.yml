name: automation | Previous Day Dev Commits

on:
  workflow_dispatch:
  schedule:
    - cron: "59 23 * * *"
  push:
    branches:
      - feature/cog-4577-continuous-docs-drafting-from-dev

permissions:
  contents: read

jobs:
  list-dev-commits:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      CLAUDE_PROMPTS_DIR: claude-prompts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch latest dev branch
        run: git fetch origin dev --no-tags

      - name: Collect previous day commits from dev
        env:
          TARGET_BRANCH: origin/dev
        run: |
          read -r START_DATE END_DATE <<EOF
          $(python3 - <<'PY'
          from datetime import datetime, time, timedelta, timezone

          today = datetime.now(timezone.utc).date()
          start = datetime.combine(today - timedelta(days=1), time.min, tzinfo=timezone.utc)
          end = datetime.combine(today, time.min, tzinfo=timezone.utc)

          print(start.strftime("%Y-%m-%dT%H:%M:%SZ"), end.strftime("%Y-%m-%dT%H:%M:%SZ"))
          PY
          )
          EOF

          echo "Collecting commit subjects from ${TARGET_BRANCH}"
          echo "Time window (UTC): ${START_DATE} <= committed_at < ${END_DATE}"

          COMMITS_FILE="$(mktemp)"
          DETAILS_FILE="$(mktemp)"
          mkdir -p "${CLAUDE_PROMPTS_DIR}"

          git log "${TARGET_BRANCH}" \
            --since="${START_DATE}" \
            --until="${END_DATE}" \
            --pretty=format:'%H%x09%s' > "${COMMITS_FILE}"

          {
            echo "## Previous day commits on dev"
            echo
            echo "- Source branch: \`${TARGET_BRANCH}\`"
            echo "- Time window (UTC): \`${START_DATE}\` to \`${END_DATE}\`"
            echo
            if [ -s "${COMMITS_FILE}" ]; then
              echo "### Commit titles"
              echo
              while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
                echo "- ${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
              done < "${COMMITS_FILE}"
              echo
              echo "### Claude prompt files"
              echo
              echo "Generated in \`${CLAUDE_PROMPTS_DIR}\` as one prompt per commit."
              echo
              echo "### Generated prompts"
              echo
              COMMIT_INDEX=0
              while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
                COMMIT_INDEX=$((COMMIT_INDEX + 1))
                SAFE_TITLE="$(printf '%s' "${COMMIT_TITLE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')"
                if [ -z "${SAFE_TITLE}" ]; then
                  SAFE_TITLE="commit"
                fi
                PROMPT_FILE="${CLAUDE_PROMPTS_DIR}/$(printf '%02d' "${COMMIT_INDEX}")-${SAFE_TITLE}-${COMMIT_SHA:0:7}.txt"
                COMMIT_PATCH_FILE="$(mktemp)"
                git show "${COMMIT_SHA}" \
                  --format='commit %H%nAuthor: %an <%ae>%nDate: %cI%nTitle: %s%n' \
                  --stat \
                  --patch > "${COMMIT_PATCH_FILE}"
                {
                  printf '%s\n' \
                    '<instructions>' \
                    'Draft documentation updates for this single commit only.' \
                    'Focus on user-facing behavior, API changes, configuration changes, setup steps, breaking changes, and anything that should appear in changelog or product docs.' \
                    'If the commit does not require docs updates, say so clearly and explain why.' \
                    '</instructions>' \
                    '' \
                    '<context>' \
                    'This commit is from the dev branch.' \
                    'Treat the patch below as the only source of truth for this prompt.' \
                    '</context>' \
                    '' \
                    '<commit>'
                  printf '<title>%s</title>\n' "${COMMIT_TITLE}"
                  printf '%s\n' \
                    '<branch>dev</branch>' \
                    '<diff>' \
                    '```diff'
                  cat "${COMMIT_PATCH_FILE}"
                  printf '%s\n' \
                    '```' \
                    '</diff>' \
                    '</commit>' \
                    '' \
                    '<output_format>' \
                    'Return the following sections:' \
                    '1. Summary' \
                    '2. Documentation impact' \
                    '3. Changelog draft' \
                    '4. Pages to update' \
                    '5. Open questions' \
                    '</output_format>'
                } > "${PROMPT_FILE}"
                {
                  echo "#### ${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
                  echo
                  echo "- Claude prompt file: \`${PROMPT_FILE}\`"
                  echo
                  echo '```text'
                  cat "${PROMPT_FILE}"
                  echo '```'
                  echo
                } >> "${DETAILS_FILE}"
              done < "${COMMITS_FILE}"
              cat "${DETAILS_FILE}"
            else
              echo "No commits were found on \`${TARGET_BRANCH}\` during the previous UTC day."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ -s "${COMMITS_FILE}" ]; then
            echo "Commit titles:"
            while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
              echo "- ${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
            done < "${COMMITS_FILE}"
            echo
            echo "Claude prompt files:"
            find "${CLAUDE_PROMPTS_DIR}" -maxdepth 1 -type f | sort
            echo
            echo "Generated prompts:"
            while IFS=$'\t' read -r COMMIT_SHA COMMIT_TITLE; do
              echo "::group::${COMMIT_TITLE} (${COMMIT_SHA:0:7})"
              cat "${CLAUDE_PROMPTS_DIR}/"*"${COMMIT_SHA:0:7}.txt"
              echo "::endgroup::"
            done < "${COMMITS_FILE}"
          else
            echo "No commits were found on ${TARGET_BRANCH} during the previous UTC day."
          fi

      - name: Upload Claude prompts artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: previous-day-dev-claude-prompts
          path: ${{ env.CLAUDE_PROMPTS_DIR }}
          if-no-files-found: warn
