name: test | frontend lockfile

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "cognee-frontend/package.json"
      - "cognee-frontend/package-lock.json"
      - ".github/workflows/frontend_lockfile.yml"
  push:
    branches: [main, dev]
    paths:
      - "cognee-frontend/package.json"
      - "cognee-frontend/package-lock.json"
      - ".github/workflows/frontend_lockfile.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-lockfile:
    name: Frontend lockfile sync
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cognee-frontend/package-lock.json

      - name: Verify package-lock.json
        working-directory: cognee-frontend
        run: npm ci
