      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
      EMBEDDING_DIMENSIONS: 300

    steps:
      - name: Check out current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # Save test scripts — they won't exist on the legacy version tag
      - name: Save compatibility test scripts
        run: cp -r cognee/tests/backwards_compatibility /tmp/compat_scripts

      # ── Phase 1: legacy version ────────────────────────────────────────────
      - name: Switch to cognee ${{ env.COGNEE_COMPATIBILITY_TEST_VERSION }}
        run: git checkout ${{ env.COGNEE_COMPATIBILITY_TEST_VERSION }}

      - name: Install cognee ${{ env.COGNEE_COMPATIBILITY_TEST_VERSION }} dependencies (with postgres extra)
        run: uv sync --extra api --extra docs --extra dev --extra postgres

      - name: "Phase 1 — add, cognify, search (cognee ${{ env.COGNEE_COMPATIBILITY_TEST_VERSION }} / postgres)"
        run: uv run python /tmp/compat_scripts/phase1_seed.py

      # ── Alembic migrations ─────────────────────────────────────────────────
      - name: Switch back to current branch
        run: git checkout ${{ github.sha }}

      - name: Install current branch dependencies (with postgres extra)
        run: uv sync --extra api --extra docs --extra dev --extra postgres

      - name: Run Alembic migrations (current branch schema → legacy version databases)
        working-directory: cognee
        run: uv run alembic upgrade head

      # ── Phase 2: current branch ────────────────────────────────────────────
      - name: "Phase 2 — search legacy version data, then add, cognify, search (current branch)"
        run: uv run python cognee/tests/backwards_compatibility/phase2_verify.py

