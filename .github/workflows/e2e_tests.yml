  run_usage_logger_test:
    name: Usage logger test (API/MCP)
    runs-on: ubuntu-latest
    container: ${{ inputs.ci-image != '' && fromJSON(format('{{"image":"{0}","credentials":{{"username":"{1}","password":"{2}"}}}}', inputs.ci-image, github.actor, github.token)) || null }}
    defaults:
      run:
        shell: bash
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cognee Setup
        uses: ./.github/actions/cognee_setup
        with:
          python-version: '3.11.x'
          extra-dependencies: "redis"

      - name: Install cognee-mcp and override with local cognee
        shell: bash
        run: |
          # 1. Install MCP (this will pull cognee from PyPI as a dependency)
          uv pip install -e ./cognee-mcp

          # 2. Force-install the local root to overwrite the PyPI version
          # This replaces the PyPI 'cognee' with your current branch code
          uv pip install --force-reinstall -e .

      - name: Run api/tool usage logger
        env:
          ENV: dev
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
          EMBEDDING_DIMENSIONS: 300
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
          GRAPH_DATABASE_PROVIDER: 'kuzu'
          USAGE_LOGGING: true
          CACHE_BACKEND: 'redis'
          CACHE_HOST: ${{ inputs.ci-image != '' && 'redis' || 'localhost' }}
        run: uv run pytest cognee/tests/test_usage_logger_e2e.py -v --log-level=INFO

