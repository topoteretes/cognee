      VECTOR_DB_HOST: localhost
      VECTOR_DB_PORT: 5432
      VECTOR_DB_USERNAME: cognee
      VECTOR_DB_PASSWORD: cognee
      VECTOR_DATASET_DATABASE_HANDLER: "pgvector"

      ENV: dev
