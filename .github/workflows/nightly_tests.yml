name: Nightly Tests
permissions:
  contents: read
  packages: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  # TEMPORARY: run on PRs touching the nightly performance workflows so the new
  # War and Peace jobs can be tested end-to-end. REMOVE this `pull_request`
  # trigger before merging the PR — nightly should only run on schedule.
  pull_request:
    paths:
      - '.github/workflows/nightly_tests.yml'
      - '.github/workflows/performance_report.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUNTIME__LOG_LEVEL: ERROR
  ENV: 'dev'

jobs:
  ollama-tests:
    name: Ollama Tests
    uses: ./.github/workflows/test_ollama.yml
    secrets: inherit

  llamacpp-tests:
    name: Llama-cpp Tests
    uses: ./.github/workflows/test_llamacpp.yml
    secrets: inherit

  # ── Performance: 50 Small Documents (memories.json from S3) ──────────────────
  performance-small-llm:
    name: Performance 50 Small Documents (real LLM)
    uses: ./.github/workflows/performance_report.yml
    with:
      mode: llm
      label: 50_small_documents
      runs: '10'
      num_memories: '50'
      memories_key: nightly_ci_artifacts/performance_test_artifacts/memories.json
    secrets: inherit

  performance-small-mock:
    name: Performance 50 Small Documents (mock LLM)
    uses: ./.github/workflows/performance_report.yml
    with:
      mode: mock_llm
      label: 50_small_documents
      runs: '10'
      num_memories: '50'
      memories_key: nightly_ci_artifacts/performance_test_artifacts/memories.json
      mock_memories_key: nightly_ci_artifacts/performance_test_artifacts/mock_memories.json
    secrets: inherit

  # ── Performance: War and Peace (large input/mock files pulled from S3) ───────
  performance-wap-llm:
    name: Performance War and Peace (real LLM)
    uses: ./.github/workflows/performance_report.yml
    with:
      mode: llm
      label: war_and_peace
      runs: '5'
      memories_key: nightly_ci_artifacts/performance_test_artifacts/war_and_peace.json
    secrets: inherit

  performance-wap-mock:
    name: Performance War and Peace (mock LLM)
    uses: ./.github/workflows/performance_report.yml
    with:
      mode: mock_llm
      label: war_and_peace
      runs: '10'
      memories_key: nightly_ci_artifacts/performance_test_artifacts/war_and_peace.json
      mock_memories_key: nightly_ci_artifacts/performance_test_artifacts/mock_war_and_peace.json
    secrets: inherit

  notify:
    name: Test Completion Status
    needs: [
      ollama-tests,
      llamacpp-tests,
      performance-small-llm,
      performance-small-mock,
      performance-wap-llm,
      performance-wap-mock,
    ]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.ollama-tests.result }}" == "success" &&
                "${{ needs.llamacpp-tests.result }}" == "success" &&
                "${{ needs.performance-small-llm.result }}" == "success" &&
                "${{ needs.performance-small-mock.result }}" == "success" &&
                "${{ needs.performance-wap-llm.result }}" == "success" &&
                "${{ needs.performance-wap-mock.result }}" == "success" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "summary=All nightly test suites completed successfully!" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "summary=One or more nightly test suites failed." >> "$GITHUB_OUTPUT"
          fi
          echo "ran_at=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Presign performance report links
        id: presign
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_DEV_USER_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_DEV_USER_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-west-1
          BUCKET: github-runner-cognee-tests
          SMALL_LLM_KEY: ${{ needs.performance-small-llm.outputs.html_key }}
          SMALL_MOCK_KEY: ${{ needs.performance-small-mock.outputs.html_key }}
          WAP_LLM_KEY: ${{ needs.performance-wap-llm.outputs.html_key }}
          WAP_MOCK_KEY: ${{ needs.performance-wap-mock.outputs.html_key }}
        run: |
          set -euo pipefail
          # 7 days = 604800s is the maximum lifetime for an IAM-user presigned URL.
          # Guard for empty keys (a failed perf job produces no report).
          if [ -n "${SMALL_LLM_KEY:-}" ]; then
            echo "url_small_llm=$(aws s3 presign "s3://$BUCKET/$SMALL_LLM_KEY" --expires-in 604800)" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${SMALL_MOCK_KEY:-}" ]; then
            echo "url_small_mock=$(aws s3 presign "s3://$BUCKET/$SMALL_MOCK_KEY" --expires-in 604800)" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${WAP_LLM_KEY:-}" ]; then
            echo "url_wap_llm=$(aws s3 presign "s3://$BUCKET/$WAP_LLM_KEY" --expires-in 604800)" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${WAP_MOCK_KEY:-}" ]; then
            echo "url_wap_mock=$(aws s3 presign "s3://$BUCKET/$WAP_MOCK_KEY" --expires-in 604800)" >> "$GITHUB_OUTPUT"
          fi

      - name: Post status to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NIGHTLY_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_NIGHTLY_CHANNEL_ID }}
            text: "${{ steps.status.outputs.emoji }} Nightly Tests (${{ steps.status.outputs.ran_at }}): ${{ steps.status.outputs.summary }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    ${{ steps.status.outputs.emoji }} *Nightly Tests* — ${{ steps.status.outputs.summary }}
                    *Ran at:* `${{ steps.status.outputs.ran_at }}`
                    *Ollama:* `${{ needs.ollama-tests.result }}`  •  *Llama-cpp:* `${{ needs.llamacpp-tests.result }}`
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    *📊 Performance 50 Small Documents — Real LLM* (`${{ needs.performance-small-llm.result }}`)  •  runs `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').success }}`
                    add      p50 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').add.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').add.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').add.p99 }}s`
                    cognify  p50 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').cognify.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').cognify.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').cognify.p99 }}s`
                    search     p50 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').search.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').search.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').search.p99 }}s`
                    total      p50 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').total.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').total.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-llm.outputs.metrics || '{}').total.p99 }}s`
                    <${{ steps.presign.outputs.url_small_llm }}|HTML report>
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    *📊 Performance 50 Small Documents — Mock LLM* (`${{ needs.performance-small-mock.result }}`)  •  runs `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').success }}`
                    add      p50 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').add.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').add.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').add.p99 }}s`
                    cognify  p50 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').cognify.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').cognify.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').cognify.p99 }}s`
                    search     p50 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').search.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').search.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').search.p99 }}s`
                    total      p50 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').total.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').total.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-small-mock.outputs.metrics || '{}').total.p99 }}s`
                    <${{ steps.presign.outputs.url_small_mock }}|HTML report>
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    *📚 Performance War and Peace — Real LLM* (`${{ needs.performance-wap-llm.result }}`)  •  runs `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').success }}`
                    add      p50 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').add.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').add.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').add.p99 }}s`
                    cognify  p50 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').cognify.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').cognify.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').cognify.p99 }}s`
                    search     p50 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').search.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').search.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').search.p99 }}s`
                    total      p50 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').total.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').total.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-llm.outputs.metrics || '{}').total.p99 }}s`
                    <${{ steps.presign.outputs.url_wap_llm }}|HTML report>
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    *📚 Performance War and Peace — Mock LLM* (`${{ needs.performance-wap-mock.result }}`)  •  runs `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').success }}`
                    add      p50 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').add.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').add.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').add.p99 }}s`
                    cognify  p50 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').cognify.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').cognify.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').cognify.p99 }}s`
                    search     p50 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').search.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').search.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').search.p99 }}s`
                    total      p50 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').total.p50 }}s`  •  p90 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').total.p90 }}s`  •  p99 `${{ fromJSON(needs.performance-wap-mock.outputs.metrics || '{}').total.p99 }}s`
                    <${{ steps.presign.outputs.url_wap_mock }}|HTML report>
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>

      - name: Fail if any suite failed
        if: ${{ steps.status.outputs.passed != 'true' }}
        run: |
          echo "One or more nightly test suites failed."
          exit 1
