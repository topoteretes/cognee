name: Nightly Tests
permissions:
  contents: read
  packages: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  # TODO: REMOVE BEFORE MERGE — temporary trigger to validate the Slack
  # notification on a PR. Scoped to this file so it only runs on PRs that touch
  # the nightly workflow. Delete this `pull_request` block once Slack is verified.
  pull_request:
    paths:
      - '.github/workflows/nightly_tests.yml'
      - '.github/workflows/performance_report.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUNTIME__LOG_LEVEL: ERROR
  ENV: 'dev'

jobs:
  ollama-tests:
    name: Ollama Tests
    uses: ./.github/workflows/test_ollama.yml
    secrets: inherit

  llamacpp-tests:
    name: Llama-cpp Tests
    uses: ./.github/workflows/test_llamacpp.yml
    secrets: inherit

  performance-llm:
    name: Performance (real LLM)
    uses: ./.github/workflows/performance_report.yml
    with:
      mode: llm
    secrets: inherit

  performance-mock:
    name: Performance (mock LLM)
    uses: ./.github/workflows/performance_report.yml
    with:
      mode: mock_llm
    secrets: inherit

  notify:
    name: Test Completion Status
    needs: [
      ollama-tests,
      llamacpp-tests,
      performance-llm,
      performance-mock,
    ]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.ollama-tests.result }}" == "success" &&
                "${{ needs.llamacpp-tests.result }}" == "success" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "summary=All nightly test suites completed successfully!" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "summary=One or more nightly test suites failed." >> "$GITHUB_OUTPUT"
          fi
          echo "ran_at=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Post status to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NIGHTLY_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_NIGHTLY_CHANNEL_ID }}
            text: "${{ steps.status.outputs.emoji }} Nightly Tests (${{ steps.status.outputs.ran_at }}): ${{ steps.status.outputs.summary }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: |
                    ${{ steps.status.outputs.emoji }} *Nightly Tests* — ${{ steps.status.outputs.summary }}
                    *Ran at:* `${{ steps.status.outputs.ran_at }}`
                    *Ollama:* `${{ needs.ollama-tests.result }}`  •  *Llama-cpp:* `${{ needs.llamacpp-tests.result }}`

                    *📊 Performance — Real LLM* (`${{ needs.performance-llm.result }}`)  •  runs `${{ needs.performance-llm.outputs.success }}`
                    Total ingest:  p50 `${{ needs.performance-llm.outputs.p50 }}s`  •  p90 `${{ needs.performance-llm.outputs.p90 }}s`  •  p99 `${{ needs.performance-llm.outputs.p99 }}s`
                    <${{ needs.performance-llm.outputs.report_url }}|HTML report>

                    *📊 Performance — Mock LLM* (`${{ needs.performance-mock.result }}`)  •  runs `${{ needs.performance-mock.outputs.success }}`
                    Total ingest:  p50 `${{ needs.performance-mock.outputs.p50 }}s`  •  p90 `${{ needs.performance-mock.outputs.p90 }}s`  •  p99 `${{ needs.performance-mock.outputs.p99 }}s`
                    <${{ needs.performance-mock.outputs.report_url }}|HTML report>

                    <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>

      - name: Fail if any suite failed
        if: ${{ steps.status.outputs.passed != 'true' }}
        run: |
          echo "One or more nightly test suites failed."
          exit 1
