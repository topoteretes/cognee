name: Nightly Tests
permissions:
  contents: read
  packages: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUNTIME__LOG_LEVEL: ERROR
  ENV: 'dev'

jobs:
  ollama-tests:
    name: Ollama Tests
    uses: ./.github/workflows/test_ollama.yml
    secrets: inherit

  llamacpp-tests:
    name: Llama-cpp Tests
    uses: ./.github/workflows/test_llamacpp.yml
    secrets: inherit

  notify:
    name: Test Completion Status
    needs: [
      ollama-tests,
      llamacpp-tests,
    ]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.ollama-tests.result }}" == "success" &&
                "${{ needs.llamacpp-tests.result }}" == "success" ]]; then
            echo "All nightly test suites completed successfully!"
          else
            echo "One or more nightly test suites failed."
            exit 1
          fi
