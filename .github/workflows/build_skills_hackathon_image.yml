name: Build skills-hackathon image

# Builds distributed/deploy/Dockerfile into a public Docker image at
# ghcr.io/${{ github.repository }}/cognee-skills-hackathon and pushes it.
# Hackathon participants then run:
#
#   python distributed/deploy/daytona_onboarding_demo.py \
#     --prebuilt-image ghcr.io/topoteretes/cognee/cognee-skills-hackathon:latest \
#     --keep-volume
#
# Each Daytona sandbox boots in ~30s instead of ~5-7 min.

on:
  workflow_dispatch:
    inputs:
      cognee_ref:
        description: "Cognee branch or commit SHA to bake into the image"
        required: true
        default: "graphskills-on-agentic"
  push:
    branches:
      - graphskills-on-agentic
    paths:
      - "distributed/deploy/Dockerfile"
      - ".github/workflows/build_skills_hackathon_image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve cognee ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.cognee_ref }}"
          else
            REF="${{ github.sha }}"
          fi
          echo "cognee_ref=$REF" >> "$GITHUB_OUTPUT"
          # Short SHA for the image tag (works for both branch names and SHAs)
          SHORT="$(git rev-parse --short=12 "$REF" 2>/dev/null || echo "$REF" | tr '/' '-' | cut -c1-32)"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: distributed/deploy/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            COGNEE_REF=${{ steps.ref.outputs.cognee_ref }}
          tags: |
            ghcr.io/${{ github.repository }}/cognee-skills-hackathon:latest
            ghcr.io/${{ github.repository }}/cognee-skills-hackathon:${{ steps.ref.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "::notice::Pushed ghcr.io/${{ github.repository }}/cognee-skills-hackathon:latest"
          echo "::notice::Pushed ghcr.io/${{ github.repository }}/cognee-skills-hackathon:${{ steps.ref.outputs.short }}"
          echo "::notice::Cognee ref baked: ${{ steps.ref.outputs.cognee_ref }}"
