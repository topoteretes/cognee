{{- if not .Values.cognee.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cognee.llmSecretName" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{ .Values.cognee.secrets.llmApiKeyKey }}: ""
{{- end }}
{{- if and (not .Values.cognee.secrets.existingSecret) (and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret)) }}
---
{{- end }}
{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cognee.databaseSecretName" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  {{ .Values.postgres.auth.usernameKey }}: {{ .Values.postgres.auth.username | quote }}
  {{ .Values.postgres.auth.passwordKey }}: {{ include "cognee.generatedPostgresPassword" . | quote }}
  {{ .Values.postgres.auth.databaseKey }}: {{ .Values.postgres.auth.database | quote }}
{{- end }}
