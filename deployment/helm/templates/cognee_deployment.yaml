apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cognee.fullname" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cognee.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cognee.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cognee.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cognee
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: ENABLE_BACKEND_ACCESS_CONTROL
              value: {{ .Values.cognee.enableBackendAccessControl | quote }}
            - name: ENV
              value: {{ .Values.cognee.env | quote }}
            - name: PYTHONPATH
              value: "."
            - name: VECTOR_DB_PROVIDER
              value: {{ .Values.cognee.vectorDbProvider | quote }}
            - name: DB_PROVIDER
              value: postgres
            - name: DB_HOST
              value: {{ include "cognee.postgres.fullname" . }}
            - name: DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.auth.database | quote }}
            - name: DB_USERNAME
              value: {{ .Values.postgres.auth.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "cognee.fullname" .)) }}
                  key: DB_PASSWORD
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "cognee.fullname" .)) }}
                  key: LLM_API_KEY
            - name: LLM_MODEL
              value: {{ .Values.cognee.llmModel | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.cognee.llmProvider | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
