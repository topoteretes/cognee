apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cognee
  labels:
    app: {{ .Release.Name }}-cognee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-cognee
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-cognee
    spec:
      containers:
        - name: cognee
          image: "{{ .Values.cognee.image.repository }}:{{ .Values.cognee.image.tag }}"
          imagePullPolicy: {{ .Values.cognee.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.cognee.port }}
          env:
            - name: ENABLE_BACKEND_ACCESS_CONTROL
              value: "false"
            - name: ENV
              value: {{ .Values.cognee.env.ENV }}
            - name: PYTHONPATH
              value: {{ .Values.cognee.env.PYTHONPATH }}
            - name: VECTOR_DB_PROVIDER
              value: pgvector
            - name: DB_HOST
              value: {{ .Release.Name }}-postgres
            - name: DB_PORT
              value: "{{ .Values.postgres.port }}"
            - name: DB_NAME
              value: {{ .Values.postgres.env.POSTGRES_DB }}
            - name: DB_USERNAME
              value: {{ .Values.postgres.env.POSTGRES_USER }}
            - name: DB_PASSWORD
              value: {{ .Values.postgres.env.POSTGRES_PASSWORD }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-llm-api-key
                  key: LLM_API_KEY
            - name: LLM_MODEL
              value: {{ .Values.cognee.env.LLM_MODEL }}
            - name: LLM_PROVIDER
              value: {{ .Values.cognee.env.LLM_PROVIDER }}
            - name: LLM_ENDPOINT
              value: "{{ .Values.cognee.env.LLM_ENDPOINT }}"
            - name: EMBEDDING_PROVIDER
              value: "{{ .Values.cognee.env.EMBEDDING_PROVIDER }}"
            - name: EMBEDDING_MODEL
              value: "{{ .Values.cognee.env.EMBEDDING_MODEL }}"
            - name: EMBEDDING_DIMENSIONS
              value: "{{ .Values.cognee.env.EMBEDDING_DIMENSIONS }}"
            - name: EMBEDDING_ENDPOINT
              value: "{{ .Values.cognee.env.EMBEDDING_ENDPOINT }}"
          resources:
            limits:
              cpu: {{ .Values.cognee.resources.cpu }}
              memory: {{ .Values.cognee.resources.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.cognee.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
