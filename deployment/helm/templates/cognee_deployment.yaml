apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cognee.backendName" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.cognee.autoscaling.enabled }}
  replicas: {{ .Values.cognee.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cognee.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.cognee.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cognee.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "cognee.serviceAccountName" . }}
      {{- with .Values.cognee.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cognee
          image: {{ .Values.cognee.image | quote }}
          imagePullPolicy: {{ .Values.cognee.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.cognee.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cognee.configMapName" . }}
          env:
            - name: DB_HOST
              value: {{ include "cognee.databaseHost" . | quote }}
            - name: DB_PORT
              value: {{ include "cognee.databasePort" . | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "cognee.databaseSecretName" . }}
                  key: {{ include "cognee.databaseNameKey" . }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "cognee.databaseSecretName" . }}
                  key: {{ include "cognee.databaseUsernameKey" . }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cognee.databaseSecretName" . }}
                  key: {{ include "cognee.databasePasswordKey" . }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cognee.llmSecretName" . }}
                  key: {{ .Values.cognee.secrets.llmApiKeyKey }}
          {{- with .Values.cognee.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.cognee.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.cognee.probes.liveness.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.cognee.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.cognee.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.cognee.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.cognee.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.cognee.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.cognee.probes.readiness.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.cognee.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.cognee.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.cognee.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.cognee.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.cognee.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.cognee.probes.startup.path | quote }}
              port: http
            periodSeconds: {{ .Values.cognee.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.cognee.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.cognee.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.cognee.resources | nindent 12 }}
          volumeMounts:
            - name: cognee-data
              mountPath: /var/lib/cognee
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cognee-data
          {{- if .Values.cognee.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cognee.persistenceClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
