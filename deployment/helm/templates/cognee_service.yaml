apiVersion: v1
kind: Service
metadata:
  name: {{ include "cognee.backendName" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.cognee.service.type }}
  ports:
    - name: http
      port: {{ .Values.cognee.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cognee.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
