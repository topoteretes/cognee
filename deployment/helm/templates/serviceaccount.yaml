{{- if .Values.cognee.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cognee.serviceAccountName" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.cognee.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
