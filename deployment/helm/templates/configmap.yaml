apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cognee.fullname" . }}-config
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
data:
  ENV: {{ .Values.cognee.env | quote }}
  PYTHONPATH: "."
  DB_PROVIDER: "postgres"
  {{- if .Values.postgres.enabled }}
  DB_HOST: {{ include "cognee.postgres.fullname" . }}
  DB_PORT: {{ .Values.postgres.port | quote }}
  DB_NAME: {{ .Values.postgres.auth.database | quote }}
  DB_USERNAME: {{ .Values.postgres.auth.username | quote }}
  {{- else }}
  DB_HOST: {{ .Values.externalDatabase.host | quote }}
  DB_PORT: {{ .Values.externalDatabase.port | quote }}
  DB_NAME: {{ .Values.externalDatabase.database | quote }}
  DB_USERNAME: {{ .Values.externalDatabase.username | quote }}
  {{- end }}
  VECTOR_DB_PROVIDER: {{ .Values.cognee.vectorDbProvider | quote }}
  LLM_PROVIDER: {{ .Values.cognee.llmProvider | quote }}
  LLM_MODEL: {{ .Values.cognee.llmModel | quote }}
  ENABLE_BACKEND_ACCESS_CONTROL: {{ .Values.cognee.enableBackendAccessControl | quote }}
