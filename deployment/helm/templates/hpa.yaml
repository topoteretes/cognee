{{- if .Values.cognee.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cognee.backendName" . }}
  labels:
    {{- include "cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cognee.backendName" . }}
  minReplicas: {{ .Values.cognee.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.cognee.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.cognee.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
