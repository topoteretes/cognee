# Ledgerline interviewing rulebook — seed rules authored by Alex Chen.
# These rules intentionally contradict generic recruiting best practice
# and depend on Ledgerline-specific facts (exact numbers, specific
# panelists by name, an internal product name). That is the point: a
# pretrained LLM cannot guess them; the agent must consult this memory.
#
# Schema lives in rule_models.Rule (pydantic DataPoint subclass).

version: 2
author: Alex Chen
rules:

  - rule_id: R1_80_min_live_coding
    domain: scheduling
    status: approved
    source: alex_playbook
    trigger: >
      Scheduling the technical portion of an interview loop for any
      Staff-level engineering role.
    action: >
      Propose a single 80-minute live coding block. Not 90 minutes,
      not 60, exactly 80. We do not use take-home assignments.
    rationale: >
      The 80-minute split matches our production standup cadence
      (20 min setup, 50 min work, 10 min debrief). Teams have told
      us 90 minutes breaks their day.

  - rule_id: R2_exact_panel
    domain: scheduling
    status: approved
    source: alex_playbook
    trigger: >
      Composing the interview panel for any Staff-level engineering role.
    action: >
      The panel is exactly these four people, named in full — no
      substitutions and no additions:
      "Sam — CTO", "Jordan — VP of Engineering",
      "Leila — Staff Backend Engineer", "Ravi — Senior Product Manager".
    rationale: >
      Each of the four owns a dimension we've historically burned on:
      Sam on architecture fit, Jordan on cross-team collaboration,
      Leila on day-to-day engineering level, Ravi on product sense.
      We swapped people out twice and missed signals both times.

  - rule_id: R3_medium_onsite
    domain: scheduling
    status: approved
    source: alex_playbook
    trigger: >
      Choosing the medium for any Staff-level interview loop.
    action: >
      Interviews are onsite at the Berlin office only. The `medium`
      must be "onsite". Do not propose video or phone, regardless
      of candidate location. Ledgerline covers travel.
    rationale: >
      Two of three Staff offers from video-only loops disengaged
      within four months citing "didn't feel the team". Onsite is a
      hard requirement, even for international candidates.

  - rule_id: R4_noncompete_first
    domain: screening
    status: approved
    source: alex_playbook
    trigger: >
      Candidate's prior_company is Stripe, Plaid, or Adyen.
    action: >
      The screening invite's `disclosure_questions` list must put the
      non-compete question at index 0 (FIRST), before any other
      question. The wording must contain the literal phrase
      "non-compete".
    rationale: >
      We've lost offers at the finish line twice because non-compete
      surfaced late. Making it the first question sets expectations
      for the rest of the screen.

  - rule_id: R5_streamtap_mention
    domain: screening
    status: approved
    source: alex_playbook
    trigger: >
      Drafting a screening invite for any engineering role.
    action: >
      The invite `body` must mention Ledgerline's open-source Kafka
      fork, "streamtap", by that exact name. Candidates should have
      the chance to read about it before the call.
    rationale: >
      Streamtap is our main technical differentiator and OSS
      footprint. Mentioning it upfront filters for candidates who
      care about OSS infra work.

  - rule_id: R6_hours_exactly_4
    domain: scheduling
    status: approved
    source: alex_playbook
    trigger: >
      Sizing the total footprint of a Staff-level interview loop.
    action: >
      `total_hours` must be exactly 4.0 — not 4.5, not 5. Any drift
      above 4.0 always turned out to be a panelist padding their slot.
    rationale: >
      Four hours is the footprint our four required panelists can
      cover without overextending. Anything more is waste and signals
      the panel wasn't briefed on scope.
